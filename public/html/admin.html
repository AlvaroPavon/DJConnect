<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel de Administración | DJConnect</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/config.js?v=2.2.1"></script>
    <script src="/js/admin.js?v=2.2.1" defer></script>

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#d946ef"> <!-- Respetuoso con la temática Neon/Glassmorphism -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DJ Admin">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/images/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/images/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/images/icon-512x512.png">
    <script src="/js/pwa-install.js?v=2.2.1" defer></script>
</head>
<body>
    <div class="container animate-fade-in" style="max-width: 1200px;">
        
        <!-- ==========================================
             ZONA CABECERA Y LOGO
             ========================================== -->
        <div id="company-logo-container">
            <img id="company-logo" src="" alt="Logo" style="display: none;">
        </div>

        <h1 class="glow-text">🛡️ Panel de Control Global</h1>
        <p id="admin-welcome">Bienvenido, <strong id="admin-name" style="color: var(--color-primary)">...</strong></p>

        <!-- ==========================================
             NAVEGACIÓN PRINCIPAL
             Navegación en tarjetas flotantes (Glassmorphism)
             ========================================== -->
        <div class="nav-links">
            <a href="/html/admin-djs.html" class="btn">🎧 Personal & DJs</a>
            <a href="/html/admin-parties.html" class="btn">🎉 Monitor Fiestas</a>
            <a href="/html/admin-wishlists.html" class="btn">🎵 Base Wishlists</a>
            <a href="/html/admin-settings.html" class="btn btn-secondary">⚙️ Ajustes</a>
        </div>

        <hr style="margin: 30px 0; border-color: rgba(255,255,255,0.1);">

        <!-- ==========================================
             MONITOR DE ESTADÍSTICAS (Dashboards)
             ========================================== -->
        <div class="stats-panel">
            <h3 style="margin-bottom: 20px;">📊 Monitor en Directo</h3>
            <div class="cards-grid">
                
                <div class="stats-card">
                    <h2 id="total-djs" style="color: var(--color-primary);">0</h2>
                    <p>DJs en Plantilla</p>
                </div>
                
                <div class="stats-card">
                    <h2 id="active-parties" style="color: var(--color-secondary);">0</h2>
                    <p>Fiestas Activas de DJs</p>
                </div>
                
                <div class="stats-card">
                    <h2 id="total-wishlists" style="color: var(--color-accent);">0</h2>
                    <p>Listas Musicales</p>
                </div>

            </div>
        </div>

        <!-- ==========================================
             BOTONERA DE ACCIÓN RÁPIDA (Responsive UI)
             ========================================== -->
        <div class="stats-panel" style="margin-top: 30px;">
            <h3 style="margin-bottom: 20px;">🚀 Puntos de Acceso Rápido</h3>
            <div class="cards-grid">
                <button onclick="window.location.href='/html/admin-djs.html'" class="btn" style="width: 100%;">
                    ➕ Nombrar nuevo DJ
                </button>
                <button onclick="window.location.href='/html/admin-parties.html'" class="btn btn-secondary" style="width: 100%;">
                    🚨 Forzar Apagado Fiestas
                </button>
                <button onclick="window.location.href='/html/admin-wishlists.html'" class="btn" style="background-color: var(--color-accent); width: 100%;">
                    📝 Gestión de Listas
                </button>
            </div>
        </div>

        <!-- Cierre de sesión -->
        <button onclick="logout()" class="btn btn-danger" style="margin-top: 40px; width: 100%; max-width: 300px; display: block; margin-left: auto; margin-right: auto;">
            🚪 Clausurar Sesión de Administrador
        </button>
    </div>
</body>
</html>
