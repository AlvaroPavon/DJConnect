<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Base de Datos Wishlists | DJConnect Admin</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/config.js?v=2.2.1"></script>
    <script src="/js/admin-wishlists.js?v=2.2.1" defer></script>

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#d946ef">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DJ Admin">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/images/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/images/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/images/icon-512x512.png">
    <script src="/js/pwa-install.js?v=2.2.1" defer></script>
</head>
<body>
    <div class="container animate-fade-in" style="max-width: 1200px;">
        
        <div id="company-logo-container">
            <img id="company-logo" src="" alt="Logo" style="display: none; border-radius: 15px;">
        </div>

        <h1 class="glow-text">🎵 Sistema de Listas (Wishlists)</h1>
        
        <div class="nav-links">
            <a href="/html/admin.html" class="btn btn-secondary">← Retorno al Mando Central</a>
        </div>

        <hr style="margin: 30px 0; border-color: rgba(255,255,255,0.1);">

        <!-- ==========================================
             PANEL CREACIÓN WISHLIST
             ========================================== -->
        <div class="stats-panel" style="margin-bottom: 30px;">
            <h3 style="margin-bottom: 20px; color: var(--color-primary);">➕ Preestablecer una Wishlist</h3>
            <form id="create-wishlist-form" class="cards-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
                <input type="text" id="wishlist-name" placeholder="Título de la Lista" required>
                <input type="text" id="wishlist-description" placeholder="Nota descriptiva (Opcional)">
                <input type="date" id="wishlist-date" style="padding: 15px; border-radius: 8px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid rgba(255,255,255,0.2);">
                <select id="dj-select" class="dj-select" style="padding: 15px; border-radius: 8px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid rgba(255,255,255,0.2);" required>
                    <option value="">Cargando DJs registrados...</option>
                </select>
                <button type="submit" class="btn">🔖 Asignar Wishlist</button>
            </form>
        </div>

        <!-- ==========================================
             CONTENEDOR DE LISTAS
             ========================================== -->
        <div id="wishlists-container">
            <h3 style="margin-bottom: 20px;">📋 Registro Histórico de Wishlists</h3>
            <p id="loading-message" style="text-align: center; color: var(--color-accent);">Accediendo a base de datos... ⏳</p>
            
            <div id="wishlists-list" class="cards-grid" style="grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));"></div>
        </div>
    </div>
</body>
</html>
